  .kpi .l{font-size:12px;color:#AEBccf;margin-top:2px}

  .controls .wrap{padding-bottom:0;padding-top:0}
  .tabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}

  .search svg{position:absolute;left:12px;top:11px;width:16px;height:16px;fill:var(--muted)}

  .viewtoggle{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}

  .resultline{font-size:13px;color:var(--muted);margin:14px 0 4px}

  .slot-h{display:flex;align-items:center;gap:12px;margin-bottom:12px;position:sticky;top:138px;z-index:10}

  .slot-line{flex:1;height:1px;background:var(--line)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px;border-left:4px solid var(--other);transition:.15s;cursor:pointer}

  .pill.lv.l2{background:#E3F2FD;color:#1565C0;border-color:#BBDEFB}
  .pill.lv.l3{background:#FFF3E0;color:#E65100;border-color:#FFE0B2}
  .pill.lv.l4{background:#FCE4EC;color:#AD1457;border-color:#F8BBD0}
  .title{font-size:15.5px;font-weight:700;line-height:1.45;color:var(--ink)}

  .meta span{display:inline-flex;align-items:center;gap:4px}
  .meta svg{width:13px;height:13px;fill:var(--muted);opacity:.8}
  .tags{display:flex;flex-wrap:wrap;gap:5px}

  .tag.topic{background:#EAF0FB;color:#2851a3;font-weight:600}

  .ov.show{display:flex}
  .modal{background:#fff;border-radius:16px;max-width:680px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;animation:pop .18s ease}
  @keyframes pop{from{transform:translateY(8px) scale(.98);opacity:0}to{transform:none;opacity:1}}

  .modal .mh .badges{margin-bottom:10px}
  .modal h2{margin:0;font-size:20px;line-height:1.4}
  .modal .mb{padding:22px 24px}
  .modal .mmeta{display:flex;flex-wrap:wrap;gap:8px 18px;font-size:13.5px;color:var(--muted);margin-bottom:16px}
  .modal .mmeta b{color:var(--ink)}

  .modal .ab{font-size:14px;line-height:1.75;color:#37475a}
  .modal .close{float:right;background:rgba(255,255,255,.15);border:0;color:#fff;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:18px;line-height:1}
  @media(max-width:640px){.grid{grid-template-columns:1fr}.slot-h{top:0;position:relative}h1{font-size:21px}}
</style>
</head>

  "abstract": "瞭解如何以 Amazon Bedrock AgentCore 為基礎，為 Amazon Cognito 驗證的應用建構 AI 驅動的安全守護機制。本場次涵蓋身分安全最佳實踐、偵測分析，以及自動化防禦措施，包括動態 WAF 規則調整、驗證流程修改與 SOC 操作。歡迎帶著您的問題與場景，與我們深入探討 Cognito 應用的 AI 驅動安全控制實作。"
 }
];
const GEN = "2026/06/23";
</script>
<script>
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const typeClass=t=>({'Keynote':'Keynote','Breakout session':'Breakout','Workshop':'Workshop','Lightning talk':'Lightning','Exam prep':'Exam','Gamified learning':'Gamified','Code talk':'Code'}[t]||'Code');
const typeShort=t=>({'Keynote':'主題演講','Breakout session':'Breakout','Workshop':'Workshop','Lightning talk':'Lightning Talk','Exam prep':'考前衝刺','Gamified learning':'遊戲化學習','Code talk':'Code Talk'}[t]||t);
const lvClass=l=>l.startsWith('100')?'l1':l.startsWith('200')?'l2':l.startsWith('300')?'l3':l.startsWith('400')?'l4':'';
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

let state={day:DATA[0]?DATA[0].date:'',view:'timeline',q:'',types:[],topic:'',level:'',room:''};

// ---- init meta ----
$('#kTotal').textContent=DATA.length;
$('#genTime').textContent=GEN;
const days=[...new Map(DATA.map(d=>[d.date,d])).values()].map(d=>({date:d.date,name:d.dayName,disp:d.dayDisplay}));
function dayLabel(d){const z={Wednesday:'週三',Thursday:'週四',Monday:'週一',Tuesday:'週二',Friday:'週五'}[d.name]||d.name;return d.disp+'（'+z+'）';}

// KPIs
const byType=t=>DATA.filter(d=>d.type===t).length;
const kpis=[['議程總數',DATA.length],['活動天數',days.length],['Breakout',byType('Breakout session')],['Workshop',byType('Workshop')],['Lightning Talk',byType('Lightning talk')]];
$('#kpis').innerHTML=kpis.map(k=>`<div class="kpi"><div class="n">${k[1]}</div><div class="l">${k[0]}</div></div>`).join('');

// tabs
function renderTabs(){
  $('#dayTabs').innerHTML=days.map(d=>`<button class="tab ${state.day===d.date?'active':''}" data-d="${d.date}">${dayLabel(d)}<span class="c">${DATA.filter(x=>x.date===d.date).length}</span></button>`).join('');
  $$('#dayTabs .tab').forEach(b=>b.onclick=()=>{state.day=b.dataset.d;renderTabs();render();});
}

// filters
function fillSel(id,key){
  const vals=[...new Set(DATA.map(d=>d[key]).filter(Boolean))].sort();
  const el=$(id);vals.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;el.appendChild(o);});
}
fillSel('#fTopic','topic');fillSel('#fLevel','level');fillSel('#fRoom','room');

// type checkboxes (multi-select), ordered by frequency
const typeOrder=[...new Set(DATA.map(d=>d.type))].sort((a,b)=>DATA.filter(x=>x.type===b).length-DATA.filter(x=>x.type===a).length);
function renderTypeChecks(){
  const host=$('#typeChecks');
  host.querySelectorAll('.chk').forEach(n=>n.remove());
  typeOrder.forEach(t=>{
    const n=DATA.filter(x=>x.type===t).length;
    const on=state.types.includes(t);
    const lab=document.createElement('label');
    lab.className='chk'+(on?' on':'')+' c-'+typeClass(t);
    lab.innerHTML=`<input type="checkbox" ${on?'checked':''}><span class="dot" style="background:var(--${({Keynote:'kw',Breakout:'break',Workshop:'work',Lightning:'light'}[typeClass(t)])||'other'})"></span>${typeShort(t)} <span style="color:var(--muted);font-weight:700">${n}</span>`;
    lab.querySelector('input').onchange=e=>{
      if(e.target.checked){if(!state.types.includes(t))state.types.push(t);}
      else state.types=state.types.filter(x=>x!==t);
      lab.classList.toggle('on',e.target.checked);
      render();
    };
    host.appendChild(lab);
  });
}
renderTypeChecks();

$('#q').oninput=e=>{state.q=e.target.value.toLowerCase();render();};
$('#fTopic').onchange=e=>{state.topic=e.target.value;render();};
$('#fLevel').onchange=e=>{state.level=e.target.value;render();};
$('#fRoom').onchange=e=>{state.room=e.target.value;render();};
$('#clear').onclick=()=>{state.q=state.topic=state.level=state.room='';state.types=[];$('#q').value='';['#fTopic','#fLevel','#fRoom'].forEach(s=>$(s).value='');renderTypeChecks();render();};
$('#vTimeline').onclick=()=>setView('timeline');
$('#vTable').onclick=()=>setView('table');
function setView(v){state.view=v;$('#vTimeline').classList.toggle('on',v==='timeline');$('#vTable').classList.toggle('on',v==='table');render();}

function matchFilters(d){
  if(state.types.length&&!state.types.includes(d.type))return false;
  if(state.topic&&d.topic!==state.topic)return false;
  if(state.level&&d.level!==state.level)return false;
  if(state.room&&d.room!==state.room)return false;
  if(state.q){
    const hay=[d.title,d.code,d.abstract,d.type,d.topic,d.room,...d.speakers,...d.services,...d.areas,...d.industries].join(' ').toLowerCase();
    if(!hay.includes(state.q))return false;
  }
  return true;
}

function cardHTML(d,i){
  const tags=[d.topic?`<span class="tag topic">${esc(d.topic)}</span>`:'',...d.areas.slice(0,3).map(a=>`<span class="tag">${esc(a)}</span>`)].join('');
  const spk=d.speakers.length?`<div class="spk"><svg viewBox="0 0 24 24"><path d="M12 12a5 5 0 10-5-5 5 5 0 005 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/></svg>${esc(d.speakers.join('、'))}</div>`:'';
  return `<div class="card t-${typeClass(d.type)}" data-i="${i}">
    <div class="crow"><div class="badges">
      <span class="code">${esc(d.code)}</span>
      <span class="pill type type-${typeClass(d.type)}">${typeShort(d.type)}</span>
      ${d.level?`<span class="pill lv ${lvClass(d.level)}">${esc(d.level)}</span>`:''}
    </div></div>
    <div class="title">${esc(d.title)}</div>
    <div class="meta">
      <span><svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 00-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 00-7-7zm0 9.5A2.5 2.5 0 1114.5 9 2.5 2.5 0 0112 11.5z"/></svg>${esc(d.room)}</span>
      <span><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1010 10A10 10 0 0012 2zm1 11h-3V6h2v5h3z"/></svg>${d.start}–${d.end}</span>
    </div>
    ${tags?`<div class="tags">${tags}</div>`:''}
    ${spk}
    <div class="abs">${esc(d.abstract)}</div>
  </div>`;
}

function renderTimeline(rows){
  const slots={};
  rows.forEach((d)=>{const k=d.start+'|'+d.end;(slots[k]=slots[k]||[]).push(d);});
  const keys=Object.keys(slots).sort((a,b)=>{const A=slots[a][0],B=slots[b][0];return A.startMin-B.startMin || (a<b?-1:1);});
  let html='';
  keys.forEach(k=>{
    const list=slots[k];const f=list[0];
    html+=`<div class="slot"><div class="slot-h">
      <div class="slot-time">${f.start} <span class="end">→ ${f.end}</span></div>
      <div class="slot-line"></div><div class="slot-cnt">${list.length} 場</div></div>
      <div class="grid">${list.map(d=>cardHTML(d,d._i)).join('')}</div></div>`;
  });
  return html;
}

function renderTable(rows){
  let html=`<div class="tbl-wrap"><table id="tbl"><thead><tr>
    <th data-k="code">代碼</th><th data-k="date">日期</th><th data-k="startMin">時間</th>
    <th data-k="type">類型</th><th data-k="title">議程標題</th><th data-k="topic">主題</th>
    <th data-k="level">難度</th><th data-k="room">會議室</th><th data-k="spk">講者</th></tr></thead><tbody>`;
  let curDay='';
  rows.forEach(d=>{
    if(d.date!==curDay){curDay=d.date;const dd=days.find(x=>x.date===d.date);html+=`<tr class="day-sep"><td colspan="9">📅 ${dayLabel(dd)}</td></tr>`;}
    html+=`<tr data-i="${d._i}" style="cursor:pointer">
      <td class="c">${esc(d.code)}</td><td class="tm">${d.dayDisplay}</td><td class="tm">${d.start}–${d.end}</td>
      <td><span class="pill type type-${typeClass(d.type)}" style="font-size:10px">${typeShort(d.type)}</span></td>
      <td><b>${esc(d.title)}</b></td><td>${esc(d.topic||'—')}</td>
      <td>${d.level?`<span class="pill lv ${lvClass(d.level)}" style="font-size:10px">${esc(d.level.replace(/ - .*/,'').replace(/ –.*/,''))}</span>`:'—'}</td>
      <td>${esc(d.room)}</td><td style="font-size:12px;color:var(--muted)">${esc(d.speakers.join('、')||'—')}</td></tr>`;
  });
  return html+'</tbody></table></div>';
}

let tableSort={k:'startMin',asc:true};
function render(){
  let rows=DATA.map((d,i)=>({...d,_i:i})).filter(matchFilters);
  $('#resultline').innerHTML=`符合條件 <b>${rows.length}</b> 場${state.view==='timeline'?'（僅顯示 '+dayLabel(days.find(x=>x.date===state.day))+'）':'（全部日期）'}`;
  const tl=$('#timeline'),tv=$('#tableview'),em=$('#empty');
  if(state.view==='timeline'){
    tl.classList.remove('hide');tv.classList.add('hide');
    const dayRows=rows.filter(d=>d.date===state.day);
    if(!dayRows.length){tl.innerHTML='';em.classList.remove('hide');}
    else{em.classList.add('hide');tl.innerHTML=renderTimeline(dayRows);}
    bindCards();
  }else{
    tl.classList.add('hide');
    if(!rows.length){tv.classList.add('hide');em.classList.remove('hide');return;}
    em.classList.add('hide');tv.classList.remove('hide');
    rows.sort((a,b)=>{const k=tableSort.k;let r=k==='startMin'?(a.date+a.startMin.toString().padStart(5,'0')).localeCompare(b.date+b.startMin.toString().padStart(5,'0')):(''+a[k]).localeCompare(''+b[k],'zh');return tableSort.asc?r:-r;});
    tv.innerHTML=renderTable(rows);
    $$('#tbl th').forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(tableSort.k===k)tableSort.asc=!tableSort.asc;else{tableSort.k=k;tableSort.asc=true;}render();});
    $$('#tbl tbody tr[data-i]').forEach(tr=>tr.onclick=()=>openModal(+tr.dataset.i));
  }
}
function bindCards(){$$('.card').forEach(c=>c.onclick=()=>openModal(+c.dataset.i));}

function openModal(i){
  const d=DATA[i];
  const tags=[d.topic,...d.areas].filter(Boolean).map(t=>`<span class="tag topic">${esc(t)}</span>`).join('');
  const svc=d.services.map(s=>`<span class="tag">${esc(s)}</span>`).join('');
  const feat=d.features.map(s=>`<span class="tag" style="background:#FFF4E0;color:#9A6400">${esc(s)}</span>`).join('');
  const dd=days.find(x=>x.date===d.date);
  $('#modal').innerHTML=`<div class="mh">
    <button class="close" onclick="document.getElementById('ov').classList.remove('show')">×</button>
    <div class="badges"><span class="code" style="color:#cdd8e6">${esc(d.code)}</span>
      <span class="pill type type-${typeClass(d.type)}">${typeShort(d.type)}</span>
      ${d.level?`<span class="pill lv ${lvClass(d.level)}">${esc(d.level)}</span>`:''}</div>
    <h2>${esc(d.title)}</h2></div>
    <div class="mb">
      <div class="mmeta">
        <span>📅 <b>${dayLabel(dd)}</b></span>
        <span>🕐 <b>${d.start}–${d.end}</b>（${d.length} 分鐘）</span>
        <span>📍 <b>${esc(d.room)}</b></span>
        ${d.capacity&&d.capacity!=='0'?`<span>👥 ${esc(d.capacity)} 席</span>`:''}
      </div>
      ${d.speakers.length?`<div class="sect">講者</div><div class="ab">${esc(d.speakers.join('、'))}</div>`:''}
      <div class="sect">議程說明</div><div class="ab">${esc(d.abstract)||'（無說明）'}</div>
      ${tags?`<div class="sect">主題 / 關注領域</div><div class="tags">${tags}</div>`:''}
      ${svc?`<div class="sect">相關 AWS 服務</div><div class="tags">${svc}</div>`:''}
      ${feat?`<div class="sect">議程特色</div><div class="tags">${feat}</div>`:''}
    </div>`;
  $('#ov').classList.add('show');
}
$('#ov').onclick=e=>{if(e.target.id==='ov')$('#ov').classList.remove('show');};
document.addEventListener('keydown',e=>{if(e.key==='Escape')$('#ov').classList.remove('show');});

renderTabs();render();
</script>
</body>
</html>
